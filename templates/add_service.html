{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2 class="mb-4 text-center">
            Add Service
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>
                    Service Title
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-3">

                <label>
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"
                    required
                ></textarea>

            </div>


            <div class="mb-3">

                <label>
                    Duration (Minutes)
                </label>

                <input
                    type="number"
                    name="duration"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-4">

                <label>
                    Fee
                </label>

                <input
                    type="number"
                    name="fee"
                    class="form-control"
                    required
                >

            </div>


            <button
                type="submit"
                class="btn btn-custom w-100"
            >

                Add Service

            </button>

        </form>

    </div>

</div>

{% endblock %}
