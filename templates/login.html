{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1 class="auth-title">
            Welcome Back
        </h1>

        <form method="POST">

            <div class="mb-4">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>


            <button
                type="submit"
                class="auth-btn w-100"
            >

                Login

            </button>

            <div class="text-center mt-4">

                <p class="mb-0">

                Don't have an account?

                <a
                href="/register"
                class="text-decoration-none fw-semibold"
                >

                Register

                </a>

                </p>

            </div>


        </form>

    </div>

</div>

{% endblock %}
