{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1 class="auth-title">
            Add Availability
        </h1>

        <form method="POST">


            <div class="mb-3">

                <label class="form-label">
                    Day
                </label>

                <select
                    name="day"
                    class="form-select"
                >

                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Start Time
                </label>

                <input
                    type="time"
                    name="start_time"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-4">

                <label class="form-label">
                    End Time
                </label>

                <input
                    type="time"
                    name="end_time"
                    class="form-control"
                    required
                >

            </div>


            <button
                type="submit"
                class="auth-btn w-100"
            >

                Save Availability

            </button>

        </form>

    </div>

</div>

{% endblock %}
