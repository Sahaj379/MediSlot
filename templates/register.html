{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1 class="auth-title">
            Create Account
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>


            <div class="mb-4">

                <label class="form-label">
                    Role
                </label>

                <select
                    name="role"
                    class="form-select"
                >

                    <option value="patient">
                        Patient
                    </option>

                    <option value="doctor">
                        Doctor
                    </option>

                </select>

            </div>


            <button
                type="submit"
                class="auth-btn w-100"
            >

                Register

            </button>

            <div class="text-center mt-4">

            <p class="mb-0">

            Already have an account?

            <a
            href="/login"
            class="text-decoration-none fw-semibold"
            >

            Login

            </a>

                </p>

            </div>

        </form>

    </div>

</div>

{% endblock %}
